tasks:
  - id: "reorder-and-grid-shop-ui"
    title: "Reorder Shop UI and Apply Grid Layout to Upgrades"
    description: |
      1. Open `src/KaiCoinMiner.App/MainWindow.axaml`.
      2. Locate the "Economy and Upgrades" Grid on the right panel.
      3. Change the `Grid.Row` assignment of the "Upgrades" Border to `1` and the "Auto-Miners" Border to `2`.
      4. In the "Upgrades" section, replace the `<StackPanel>` enclosing `ManualUpgradeButton`, `EfficiencyUpgradeButton`, and `MarketUpgradeButton` with `<UniformGrid Columns="2">`.
      5. Maintain existing names so XAML controls remain bound to `MainWindow.axaml.fs`.
