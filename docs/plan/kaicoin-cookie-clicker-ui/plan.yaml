plan_id: "kaicoin-cookie-clicker-ui"
objective: "Make the shop purchase UI similar to Cookie Clicker, with upgrades displayed at the top in a grid layout and items displayed below in a list layout."
created_at: "2026-05-07T00:00:00Z"
created_by: "gem-planner"
status: "approved"
research_confidence: "high"

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 0
  risk_score: "low"

tldr: |
  Modify the XAML layout of the shop pane in `MainWindow.axaml` to create a Cookie Clicker style UI. 
  The upgrades section will be placed above the auto-miners by swapping their Grid.Row assignments, and the upgrades' container will be converted from a StackPanel to a UniformGrid to present them as a horizontal grid. No F# viewmodel bindings need changing because the element Names remain intact.

