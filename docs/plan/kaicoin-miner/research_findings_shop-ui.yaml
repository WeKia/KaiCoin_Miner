plan_id: kaicoin-miner
objective: "Research current shop purchase UI and analyze smallest implementation surface for Cookie Clicker-like layout (upgrades in grid, items in list)."
focus_area: shop-ui
created_at: "2026-05-07T00:00:00Z"
created_by: "gem-researcher"
status: completed

tldr: |
  - Primary UI files are `MainWindow.axaml` (layout) and `MainWindow.axaml.fs` (state binding and logic).
  - UI is hardcoded currently; there are no dynamic ItemsControl lists for the shop. Buttons are explicitly named and updated via `setButtonStyle`.
  - Upgrades and Items (AutoMiners) are already strictly decoupled in both State (`state.Upgrades`, `state.AutoMiners`) and UI (separate StackPanels in the `Economy and Upgrades` panel).
  - The smallest implementation surface to achieve a "Cookie Clicker layout" requires reordering the borders in `MainWindow.axaml` (Upgrades first), changing the Upgrades StackPanel to a UniformGrid/WrapPanel, and updating the text formatting mapped through `MainWindow.axaml.fs` to fit smaller grid tiles.

