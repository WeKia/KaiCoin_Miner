open_questions:
- question: "If Upgrades go to a grid, will the raw strings containing cost and levels fit into the smaller tiles created by a grid layout horizontally?"
  context: "setButtonStyle concatenates multiple details (`Label | Level | Cost | READY`) into a single string. Grids might truncate this text. XAML level re-styling of the Button content might be required."
  type: "decision_blocker"
  affects: ["shop-ui-refactor"]

