tldr: |
  - `src/KaiCoinMiner.App/Assets/Background.png` exists.
  - `MainWindow.axaml` is a Grid with controls deeply tied to `MainWindow.axaml.fs` via `FindControl`.
  - The smallest safe implementation is to add an `Image` for `Background.png` as the root, display the problem text area on top, and hide all other required named controls in a collapsed panel to prevent code-behind crashes.
  - There are 33 critical controls named in the XAML that the code-behind explicitly references.

