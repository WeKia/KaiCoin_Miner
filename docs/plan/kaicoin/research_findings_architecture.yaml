related_architecture:
  components_relevant_to_domain:
    - component: AppState
      responsibility: Holds coin balance, tick rate, shop inventory, market rates.
      location: Domain.State
      relationship_to_domain: Core data model
    - component: TimerSystem
      responsibility: Ticks coin generation, rotates market news, updates graphs.
      location: Domain.Loop
      relationship_to_domain: Triggers Update messages
    - component: MathGenerator
      responsibility: Yields captchas/equations for manual mining.
      location: Domain.Minigame
      relationship_to_domain: pure functions
  data_flow_involving_domain: Redux/Elmish unidirectional flow (Dispatch Msg -> Update State -> Render View)

